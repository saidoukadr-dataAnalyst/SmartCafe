name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'interface GitHub

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App and Package EXE
        run: npm run electron:build

      - name: Upload Windows Executables
        uses: actions/upload-artifact@v4
        with:
          name: SmartCafe-Windows-EXE
          path: dist-electron/*.exe
