name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build SmartCafe Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Package EXE with Electron Builder
        run: npx -y electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: SmartCafe-Windows-Setup
          path: dist-electron/*.exe
          retention-days: 30

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: SmartCafe-Windows-Portable
          path: dist-electron/*.exe
          retention-days: 30
