name: Build iOS App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Permet de lancer le build manuellement

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          # Compilation de l'application sans signature (pour test/sideload)
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     build
                     
      - name: Package App to IPA
        run: |
          mkdir -p Payload
          # Copie de l'application compilée dans le dossier Payload
          mv ios/App/build/Release-iphoneos/App.app Payload/
          # Compression en fichier .ipa
          zip -r SmartCafe-iOS-Unsigned.ipa Payload
          
      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCafe-iOS-Unsigned
          path: SmartCafe-iOS-Unsigned.ipa
