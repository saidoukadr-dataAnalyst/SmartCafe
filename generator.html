<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCafe - Générateur de Clés d'Activation</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --border-color: #334155;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      background-color: rgba(59, 130, 246, 0.1);
      color: var(--accent-primary);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .logo svg {
      width: 30px;
      height: 30px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1.125rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent-primary);
    }

    button {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background-color: var(--accent-primary);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    .result-box {
      margin-top: 2rem;
      padding: 1.5rem;
      background-color: var(--bg-primary);
      border: 1px dashed var(--border-color);
      border-radius: var(--radius-md);
      display: none;
    }

    .result-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .key-display {
      font-family: monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .copy-btn {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      border-radius: var(--radius-md);
      width: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .copy-btn:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <rect x="9" y="11" width="6" height="5" rx="1"/>
        <path d="M12 11V9"/>
      </svg>
    </div>

    <h1>Générateur de Licence</h1>
    <p>Saisissez le code appareil unique envoyé par votre client pour calculer sa clé d'activation SmartCafe.</p>

    <div class="form-group">
      <label for="deviceId">Code Appareil Client (ID)</label>
      <input type="text" id="deviceId" placeholder="HW-XXXX-XXXX-XXXX" maxlength="20" autocomplete="off">
    </div>

    <button onclick="generateKey()">Calculer la Clé d'Activation</button>

    <div class="result-box" id="resultBox">
      <div class="result-title">Clé d'Activation Générée</div>
      <div class="key-display" id="resultKey">KEY-0000-0000</div>
      <button class="copy-btn" id="copyBtn" onclick="copyKey()">
        <svg style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="copyText">Copier la Clé</span>
      </button>
    </div>
  </div>

  <script>
    function generateKey() {
      const devId = document.getElementById('deviceId').value.trim().toUpperCase();
      if (!devId) {
        alert("Veuillez saisir un code appareil valide.");
        return;
      }
      
      const salt = "SmartCafe2026ActivationSaltKey!";
      const combined = devId + salt;
      
      // Cryptographic Polynomial Hash (same as in React code)
      let hash = 0;
      for (let i = 0; i < combined.length; i++) {
        hash = (hash * 31 + combined.charCodeAt(i)) >>> 0;
      }
      
      const hex = hash.toString(16).toUpperCase().padStart(8, '0');
      const activationKey = `KEY-${hex.slice(0, 4)}-${hex.slice(4, 8)}`;
      
      document.getElementById('resultKey').innerText = activationKey;
      document.getElementById('resultBox').style.display = 'block';
      
      // Reset copy button
      document.getElementById('copyText').innerText = "Copier la Clé";
    }

    function copyKey() {
      const keyText = document.getElementById('resultKey').innerText;
      navigator.clipboard.writeText(keyText).then(() => {
        document.getElementById('copyText').innerText = "Clé Copiée !";
        setTimeout(() => {
          document.getElementById('copyText').innerText = "Copier la Clé";
        }, 2000);
      });
    }
  </script>

</body>
</html>
